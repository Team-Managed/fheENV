name: Deploy Dev (Staging)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Deploy to Vercel (Staging)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: fheenv/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: fheenv
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: fheenv/frontend
        env:
          NEXT_PUBLIC_REGISTRY_ADDRESS: ${{ secrets.NEXT_PUBLIC_REGISTRY_ADDRESS }}
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_SEPOLIA_RPC: ${{ secrets.SEPOLIA_RPC_URL }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: pnpm run build

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: fheenv/frontend
          alias-domains: dev.fheenv.vercel.app
