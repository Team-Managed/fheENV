name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          - os: ubuntu-latest
            pkg_target: node22-linux-x64
            artifact: fheenv-linux-x64
            binary: fheenv-linux-x64

          # ── macOS — Apple Silicon (arm64) ────────────────────────────────────
          - os: macos-latest
            pkg_target: node22-macos-arm64
            artifact: fheenv-macos-arm64
            binary: fheenv-macos-arm64

          # ── macOS — Intel (x64) ──────────────────────────────────────────────
          - os: macos-13
            pkg_target: node22-macos-x64
            artifact: fheenv-macos-x64
            binary: fheenv-macos-x64

          # ── Windows ──────────────────────────────────────────────────────────
          - os: windows-latest
            pkg_target: node22-win-x64
            artifact: fheenv-windows-x64
            binary: fheenv-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: fheenv/cli
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: fheenv/cli
        run: pnpm run build

      - name: Bundle into standalone binary (Linux / macOS)
        if: runner.os != 'Windows'
        working-directory: fheenv/cli
        run: |
          npx @yao-pkg/pkg dist/index.js \
            --target ${{ matrix.pkg_target }} \
            --output ${{ matrix.binary }}

      - name: Bundle into standalone binary (Windows)
        if: runner.os == 'Windows'
        working-directory: fheenv/cli
        shell: pwsh
        run: |
          npx @yao-pkg/pkg dist/index.js `
            --target ${{ matrix.pkg_target }} `
            --output ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fheenv/cli/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Stage binaries for release
        run: |
          mkdir -p dist/release
          cp dist/fheenv-linux-x64/fheenv-linux-x64         dist/release/fheenv-linux-x64
          cp dist/fheenv-macos-arm64/fheenv-macos-arm64     dist/release/fheenv-macos-arm64
          cp dist/fheenv-macos-x64/fheenv-macos-x64         dist/release/fheenv-macos-x64
          cp dist/fheenv-windows-x64/fheenv-windows-x64.exe dist/release/fheenv-windows-x64.exe
          chmod +x dist/release/fheenv-linux-x64 dist/release/fheenv-macos-arm64 dist/release/fheenv-macos-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: fheenv ${{ github.ref_name }}
          body: |
            ## fheenv ${{ github.ref_name }}

            Zero-trust `.env` secrets manager powered by FHE.

            ### Download

            | Platform | File |
            |----------|------|
            | macOS — Apple Silicon (M1/M2/M3/M4) | `fheenv-macos-arm64` |
            | macOS — Intel | `fheenv-macos-x64` |
            | Linux x64 | `fheenv-linux-x64` |
            | Windows x64 | `fheenv-windows-x64.exe` |

            See the [README](https://github.com/${{ github.repository }}#installation) for full installation instructions.

            > Already installed? Run `fheenv update` to upgrade in-place.
          files: |
            dist/release/fheenv-linux-x64
            dist/release/fheenv-macos-arm64
            dist/release/fheenv-macos-x64
            dist/release/fheenv-windows-x64.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
