name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  guard-main:
    name: Only dev can target main
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-dev source branches
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ PRs to main must come from the dev branch."
            echo "   Source branch detected: ${{ github.head_ref }}"
            echo "   Please retarget your PR to the dev branch."
            exit 1
          fi
          echo "✅ Source branch is dev — OK to proceed."

  lint-format:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: "22",
            cache: "pnpm",
            cache-dependency-path: fheenv/pnpm-lock.yaml,
          }
      - run: pnpm install --frozen-lockfile
        working-directory: fheenv
      - name: Prettier check
        run: pnpm run format:check
        working-directory: fheenv
      - name: ESLint check
        run: pnpm run lint
        working-directory: fheenv

  contracts:
    name: Contracts (compile + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: "22",
            cache: "pnpm",
            cache-dependency-path: fheenv/pnpm-lock.yaml,
          }
      - run: pnpm install --frozen-lockfile
        working-directory: fheenv
      - run: pnpm run compile
        working-directory: fheenv
      - run: pnpm run test
        working-directory: fheenv

  cli:
    name: CLI (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: "22",
            cache: "pnpm",
            cache-dependency-path: fheenv/pnpm-lock.yaml,
          }
      - run: pnpm install --frozen-lockfile
        working-directory: fheenv
      - run: npx tsc --noEmit
        working-directory: fheenv/cli
      - run: pnpm run build
        working-directory: fheenv/cli

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: "22",
            cache: "pnpm",
            cache-dependency-path: fheenv/pnpm-lock.yaml,
          }
      - run: pnpm install --frozen-lockfile
        working-directory: fheenv
      - name: Generate Fumadocs source types
        run: npx fumadocs-mdx
        working-directory: fheenv/frontend
      - run: npx tsc --noEmit
        working-directory: fheenv/frontend
      - run: pnpm run build
        working-directory: fheenv/frontend
        env:
          NEXT_PUBLIC_REGISTRY_ADDRESS: "0xb9a29d0Cfb402d91c6f70eF117758C118f00F5B2"
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_SEPOLIA_RPC: "https://ethereum-sepolia-rpc.publicnode.com"
          PINATA_JWT: "ci-placeholder"
