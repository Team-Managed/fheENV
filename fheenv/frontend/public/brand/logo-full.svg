<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Background Gradient for the Icon -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Aqua primary gradient -->
    <linearGradient id="aqua" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Lock Icon (Left) -->
  <g transform="translate(40, 20) scale(0.3125)">
    <rect width="512" height="512" rx="120" fill="url(#bg)" stroke="url(#strokeGrad)" stroke-width="2" />
    <g opacity="0.15" stroke="#2DD4BF" stroke-width="1.5">
      <line x1="128" y1="80" x2="128" y2="432" /><line x1="384" y1="80" x2="384" y2="432" />
      <line x1="80" y1="128" x2="432" y2="128" /><line x1="80" y1="384" x2="432" y2="384" />
      <circle cx="128" cy="128" r="3" fill="#2DD4BF"/><circle cx="384" cy="128" r="3" fill="#2DD4BF"/>
      <circle cx="128" cy="384" r="3" fill="#2DD4BF"/><circle cx="384" cy="384" r="3" fill="#2DD4BF"/>
    </g>
    <g transform="translate(0, 5)">
      <path d="M 184 240 V 170 A 72 72 0 0 1 328 170 V 240" fill="none" stroke="url(#aqua)" stroke-width="36" stroke-linecap="round" />
      <rect x="136" y="240" width="240" height="180" rx="36" fill="url(#aqua)" />
      <rect x="156" y="260" width="200" height="140" rx="20" fill="#0F172A" />
      <g transform="translate(256, 330)">
        <path d="M -18 -20 L -38 0 L -18 20" fill="none" stroke="#2DD4BF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M 18 -20 L 38 0 L 18 20" fill="none" stroke="#2DD4BF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="0" cy="0" r="10" fill="#0EA5E9" filter="url(#glow)" />
      </g>
    </g>
  </g>

  <!-- Text Section -->
  <g transform="translate(240, 125)">
    <text font-family="Space Grotesk, sans-serif, monospace" font-weight="700" font-size="96" letter-spacing="-3">
      <tspan fill="#2DD4BF">fhe</tspan><tspan fill="#F8FAFC">ENV</tspan>
    </text>
  </g>
</svg>
