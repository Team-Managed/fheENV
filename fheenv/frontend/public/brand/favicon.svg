    <path d="M 11.5 15 V 10.5 A 4.5 4.5 0 0 1 20.5 10.5 V 15" fill="none" stroke="url(#aqua)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Body -->
    <rect x="7" y="15" width="18" height="13" rx="3" fill="url(#aqua)" />
    <!-- Inner Plate -->
    <rect x="8.5" y="16.5" width="15" height="10" rx="1.5" fill="#0F172A" />
    
    <!-- Code Brackets -->
    <g transform="translate(16, 21.5)">
      <path d="M -1.5 -2 L -3.5 0 L -1.5 2" fill="none" stroke="#2DD4BF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 1.5 -2 L 3.5 0 L 1.5 2" fill="none" stroke="#2DD4BF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="0" cy="0" r="1" fill="#0EA5E9" />
    </g>
  </g>
</svg>
