packages:
  - "core"
  - "frontend"
  - "cli"

minimumReleaseAgeExclude:
  - viem@2.54.3

# Force cofhe-contracts to 0.1.3 everywhere.
# @cofhe/mock-contracts@0.5.2 uses createDecryptTask which was removed in 0.1.4.
overrides:
  "@fhenixprotocol/cofhe-contracts": "0.1.3"

# Hardhat 2 and some CoFHE packages use phantom deps (e.g. @openzeppelin/contracts).
# shamefullyHoist gives npm-style flat node_modules so they resolve correctly.
shamefullyHoist: true

# pnpm v11: allowBuilds replaces onlyBuiltDependencies.
allowBuilds:
  "@fhenixprotocol/cofhe-contracts": true
  bufferutil: true
  core-js: false
  esbuild: true
  keccak: true
  secp256k1: true
  sharp: false
  unrs-resolver: true
  utf-8-validate: true
